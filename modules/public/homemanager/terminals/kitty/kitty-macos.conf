# BEGIN_KITTY_FONTS
font_family      family="JetBrainsMono Nerd Font Mono"
# font_family      family="Hack Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 13.0
# END_KITTY_FONTS

copy_on_select yes

scrollback_lines 600000

macos_option_as_alt yes
macos_quit_when_last_window_closed yes

# handle urls
detect_urls yes
# url_color #7B8887
url_style curly
url_prefixes http https file ftp gemini irc gopher mailto news git

map alt+enter toggle_fullscreen

clipboard_control write-clipboard write-primary read-clipboard read-primary

# Theme
#
## Generate a config with `kitty themes` and then copy the values you need into your config file.

## name: Tokyo Night Moon
## license: MIT
## author: Folke Lemaitre
## upstream: https://github.com/folke/tokyonight.nvim/raw/main/extras/kitty/tokyonight_moon.conf

background #222436
foreground #c8d3f5
selection_background #2d3f76
selection_foreground #c8d3f5
url_color #4fd6be
cursor #c8d3f5
cursor_text_color #222436

# Tabs
active_tab_background #82aaff
active_tab_foreground #1e2030
inactive_tab_background #2f334d
inactive_tab_foreground #545c7e
#tab_bar_background #1b1d2b

# Windows
active_border_color #82aaff
inactive_border_color #2f334d

# normal
color0 #1b1d2b
color1 #ff757f
color2 #c3e88d
color3 #ffc777
color4 #82aaff
color5 #c099ff
color6 #86e1fc
color7 #828bb8

# bright
color8 #444a73
color9 #ff757f
color10 #c3e88d
color11 #ffc777
color12 #82aaff
color13 #c099ff
color14 #86e1fc
color15 #c8d3f5

# extended colors
color16 #ff966c
color17 #c53b53

